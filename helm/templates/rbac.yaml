{{- $injectorSA := .Values.vaultDbInjector.injector.serviceAccountName | default (include "vault-db-injector.fullname" .) -}}
{{- $renewerSA  := .Values.vaultDbInjector.renewer.serviceAccountName  | default (printf "%s%s" (include "vault-db-injector.fullname" .) (ternary "-renewer" "" .Values.vaultDbInjector.configuration.useProjectedSA)) -}}
{{- $revokerSA  := .Values.vaultDbInjector.revoker.serviceAccountName  | default (printf "%s%s" (include "vault-db-injector.fullname" .) (ternary "-revoker" "" .Values.vaultDbInjector.configuration.useProjectedSA)) -}}
{{- $nriSA      := .Values.nri.serviceAccountName                       | default (include "vault-db-injector.fullname" .) -}}
{{- $podsSubjects := list $injectorSA $renewerSA $revokerSA -}}
{{- if .Values.nri.enabled -}}{{- $podsSubjects = append $podsSubjects $nriSA -}}{{- end -}}
{{- $podsSubjects = uniq $podsSubjects -}}
{{- $leasesSubjects := uniq (list $renewerSA $revokerSA) -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vault-db-injector.fullname" . }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vault-db-injector.fullname" . }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "vault-db-injector.fullname" . }}'
subjects:
{{- range $podsSubjects }}
- kind: ServiceAccount
  name: {{ . }}
  namespace: '{{ $.Release.Namespace }}'
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vault-db-injector.fullname" . }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vault-db-injector.fullname" . }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "vault-db-injector.fullname" . }}'
subjects:
{{- range $leasesSubjects }}
- kind: ServiceAccount
  name: {{ . }}
  namespace: '{{ $.Release.Namespace }}'
{{- end }}
{{- if not .Values.vaultDbInjector.injector.serviceAccountName }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $injectorSA }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
{{- if .Values.vaultDbInjector.injector.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.vaultDbInjector.injector.serviceAccount.annotations | nindent 4 }}
{{- end }}
{{- end }}
{{- if .Values.vaultDbInjector.configuration.useProjectedSA }}
{{- if not .Values.vaultDbInjector.renewer.serviceAccountName }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $renewerSA }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
{{- end }}
{{- if not .Values.vaultDbInjector.revoker.serviceAccountName }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $revokerSA }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
{{- end }}
{{- end }}
{{- if and .Values.nri.enabled (not .Values.nri.serviceAccountName) (ne $nriSA $injectorSA) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $nriSA }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
{{- end }}
{{- if .Values.vaultDbInjector.configuration.useProjectedSA }}
{{- $tokenSubjects := list $injectorSA -}}
{{- if .Values.nri.enabled -}}{{- $tokenSubjects = append $tokenSubjects $nriSA -}}{{- end -}}
{{- $tokenSubjects = uniq $tokenSubjects }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vault-db-injector.fullname" . }}-token-requester
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vault-db-injector.fullname" . }}-token-requester
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vault-db-injector.fullname" . }}-token-requester
subjects:
{{- range $tokenSubjects }}
- kind: ServiceAccount
  name: {{ . }}
  namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
