apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "vault-db-injector.fullname" . }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# NRI plugin labels its node when ready so the webhook nodeAffinity gates
# pod scheduling on plugin readiness. Patch on nodes is cluster-wide
# because we cannot pin to "self" via RBAC; the plugin restricts its
# writes to os.Getenv("NODE_NAME").
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vault-db-injector.fullname" . }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "vault-db-injector.fullname" . }}'
subjects:
- kind: ServiceAccount
  name: '{{ include "vault-db-injector.fullname" . }}'
  namespace: '{{ .Release.Namespace }}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vault-db-injector.fullname" . }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vault-db-injector.fullname" . }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "vault-db-injector.fullname" . }}'
subjects:
- kind: ServiceAccount
  name: '{{ include "vault-db-injector.fullname" . }}'
  namespace: '{{ .Release.Namespace }}'
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vault-db-injector.fullname" . }}
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}