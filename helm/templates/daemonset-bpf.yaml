{{- if .Values.bpf.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "vault-db-injector.fullname" . }}-bpf
  labels:
  {{- include "vault-db-injector.labels" . | nindent 4 }}
    app.kubernetes.io/component: bpf
spec:
  selector:
    matchLabels:
      app: vault-db-bpf
    {{- include "vault-db-injector.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bpf
  template:
    metadata:
      labels:
        app: vault-db-bpf
      {{- include "vault-db-injector.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bpf
      annotations:
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
    spec:
      containers:
      - name: vault-db-bpf
        image: "{{ .Values.bpf.image.repository | default .Values.vaultDbInjector.injector.image.repository }}:{{ .Values.bpf.image.tag | default .Values.vaultDbInjector.injector.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.bpf.imagePullPolicy | default "IfNotPresent" }}
        args:
        - "--config=/bpf/config.yaml"
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8888
          name: healthcheck
          protocol: TCP
        resources:
          {{- toYaml .Values.bpf.resources | nindent 10 }}
        securityContext:
          # Must run as root in-container for the BPF helpers (bpf_probe_*)
          # to be effective: capabilities only become CapEff when the process
          # is root or the binary has file caps. BPF / PERFMON / SYS_RESOURCE
          # are added explicitly; ALL others dropped — so this is far from a
          # full-power container, despite uid 0.
          runAsUser: 0
          runAsNonRoot: false
          privileged: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            # BPF + PERFMON: load and attach BPF programs.
            # SYS_RESOURCE: raise locked-memory limit for BPF maps.
            # SYS_ADMIN: required by the kernel verifier to permit the
            #   bpf_probe_write_user helper in tracepoint programs (the helper
            #   can corrupt arbitrary user-space memory, hence the extra gate).
            add: ["BPF", "PERFMON", "SYS_RESOURCE", "SYS_ADMIN"]
            drop: ["ALL"]
        volumeMounts:
        - name: config-bpf
          mountPath: /bpf
        - name: tmpfs
          mountPath: /run/vault-db-injector/bpf
        - name: cgroup
          mountPath: /sys/fs/cgroup
          readOnly: true
        - name: bpffs
          mountPath: /sys/fs/bpf
        - name: kernel-security
          mountPath: /sys/kernel/security
          readOnly: true
        - name: tracefs
          mountPath: /sys/kernel/tracing
          readOnly: true
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: healthcheck
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 60
          successThreshold: 1
          timeoutSeconds: 1
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: healthcheck
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
      imagePullSecrets:
      - name: registry-token
      serviceAccountName: {{ include "vault-db-injector.fullname" . }}
      volumes:
      - configMap:
          defaultMode: 420
          name: {{ include "vault-db-injector.fullname" . }}-bpf
        name: config-bpf
      # tmpfs persistence: hostPath at /run/vault-db-injector/bpf.
      # /run is tmpfs on every modern Linux distribution (mounted by
      # systemd-tmpfiles), so files survive a DaemonSet pod restart but
      # disappear on node reboot — exactly the credential lifecycle we
      # want. emptyDir{medium: Memory} is per-POD and would be wiped on
      # every DS restart, breaking restoreBPFMaps for already-running pods.
      - name: tmpfs
        hostPath:
          path: /run/vault-db-injector/bpf
          type: DirectoryOrCreate
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
          type: Directory
      - name: bpffs
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
      - name: kernel-security
        hostPath:
          path: /sys/kernel/security
          type: DirectoryOrCreate
      - name: tracefs
        hostPath:
          path: /sys/kernel/tracing
          type: DirectoryOrCreate
      {{- if .Values.bpf.tolerations }}
      tolerations:
        {{- toYaml .Values.bpf.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.bpf.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.bpf.nodeSelector | nindent 8 }}
      {{- end }}
{{- end }}
