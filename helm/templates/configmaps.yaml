apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vault-db-injector.fullname" . }}-injector
data:
  config.yaml: |
    certFile: /tls/tls.crt
    keyFile: /tls/tls.key
    vaultAddress: {{ .Values.vaultDbInjector.configuration.vaultAddress }}
    vaultAuthPath: {{ .Values.vaultDbInjector.configuration.vaultAuthPath }}
    logLevel: {{ .Values.vaultDbInjector.configuration.logLevel }}
    kubeRole: {{ .Values.vaultDbInjector.configuration.kubeRole }}
    tokenTTL: {{ .Values.vaultDbInjector.configuration.tokenTTL }}
    vaultSecretName: {{ .Values.vaultDbInjector.configuration.vaultSecretName }}
    vaultSecretPrefix: {{ .Values.vaultDbInjector.configuration.vaultSecretPrefix }}
    mode: injector
    sentry: {{ .Values.vaultDbInjector.configuration.sentry }}
    sentryDsn: {{ .Values.vaultDbInjector.configuration.sentryDsn }}
    useProjectedSA: {{ .Values.vaultDbInjector.configuration.useProjectedSA }}
    tokenRequestAudiences:{{ toYaml (.Values.vaultDbInjector.configuration.tokenRequestAudiences | default list) | nindent 6 }}
    tokenRequestExpirationSeconds: {{ .Values.vaultDbInjector.configuration.tokenRequestExpirationSeconds }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vault-db-injector.fullname" . }}-renewer
data:
  config.yaml: |
    vaultAddress: {{ .Values.vaultDbInjector.configuration.vaultAddress }}
    vaultAuthPath: {{ .Values.vaultDbInjector.configuration.vaultAuthPath }}
    logLevel: {{ .Values.vaultDbInjector.configuration.logLevel }}
    kubeRole: {{ .Values.vaultDbInjector.configuration.kubeRoleRenewer | default .Values.vaultDbInjector.configuration.kubeRole }}
    tokenTTL: {{ .Values.vaultDbInjector.configuration.tokenTTL }}
    vaultSecretName: {{ .Values.vaultDbInjector.configuration.vaultSecretName }}
    vaultSecretPrefix: {{ .Values.vaultDbInjector.configuration.vaultSecretPrefix }}
    mode: renewer
    sentry: {{ .Values.vaultDbInjector.configuration.sentry }}
    sentryDsn: {{ .Values.vaultDbInjector.configuration.sentryDsn }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vault-db-injector.fullname" . }}-revoker
data:
  config.yaml: |
    vaultAddress: {{ .Values.vaultDbInjector.configuration.vaultAddress }}
    vaultAuthPath: {{ .Values.vaultDbInjector.configuration.vaultAuthPath }}
    logLevel: {{ .Values.vaultDbInjector.configuration.logLevel }}
    kubeRole: {{ .Values.vaultDbInjector.configuration.kubeRoleRevoker | default .Values.vaultDbInjector.configuration.kubeRole }}
    tokenTTL: {{ .Values.vaultDbInjector.configuration.tokenTTL }}
    vaultSecretName: {{ .Values.vaultDbInjector.configuration.vaultSecretName }}
    vaultSecretPrefix: {{ .Values.vaultDbInjector.configuration.vaultSecretPrefix }}
    mode: revoker
    sentry: {{ .Values.vaultDbInjector.configuration.sentry }}
    sentryDsn: {{ .Values.vaultDbInjector.configuration.sentryDsn }}
    injectorLabel: {{ .Values.vaultDbInjector.configuration.injectorLabel }}
{{- if .Values.nri.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vault-db-injector.fullname" . }}-nri
data:
  config.yaml: |
    vaultAddress: {{ .Values.vaultDbInjector.configuration.vaultAddress }}
    vaultAuthPath: {{ .Values.vaultDbInjector.configuration.vaultAuthPath }}
    logLevel: {{ .Values.vaultDbInjector.configuration.logLevel }}
    kubeRole: {{ .Values.vaultDbInjector.configuration.kubeRoleNri | default .Values.vaultDbInjector.configuration.kubeRole }}
    tokenTTL: {{ .Values.vaultDbInjector.configuration.tokenTTL }}
    vaultSecretName: {{ .Values.vaultDbInjector.configuration.vaultSecretName }}
    vaultSecretPrefix: {{ .Values.vaultDbInjector.configuration.vaultSecretPrefix }}
    mode: nri
    sentry: {{ .Values.vaultDbInjector.configuration.sentry }}
    sentryDsn: {{ .Values.vaultDbInjector.configuration.sentryDsn }}
    useProjectedSA: {{ .Values.vaultDbInjector.configuration.useProjectedSA }}
    tokenRequestAudiences:{{ toYaml (.Values.vaultDbInjector.configuration.tokenRequestAudiences | default list) | nindent 6 }}
    tokenRequestExpirationSeconds: {{ .Values.vaultDbInjector.configuration.tokenRequestExpirationSeconds }}
    nri:
      enabled: true
      socketPath: /var/run/nri/nri.sock
      cachePath: /run/{{ include "vault-db-injector.fullname" . }}/nri/cache.json
      pluginName: {{ include "vault-db-injector.fullname" . }}
      pluginIndex: {{ .Values.nri.pluginIndex | default "10" | quote }}
      podLabel: {{ .Values.vaultDbInjector.configuration.webhookMatchLabels | quote }}
      fetchTimeout: {{ .Values.nri.fetchTimeout | default "1500ms" | quote }}
      prewarmer:
        enabled: {{ .Values.nri.prewarmer.enabled }}
        maxConcurrent: {{ .Values.nri.prewarmer.maxConcurrent | default 50 }}
{{- end }}