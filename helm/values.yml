vaultDbInjector:
  configuration:
    # -- Vault or OpenBao base URL the binaries log into.
    vaultAddress: "https://vault1.numberly.in:8200"
    # -- Mount path of the Kubernetes auth method on Vault.
    vaultAuthPath: "kubernetes"
    # -- Log level for all three binaries (`debug`, `info`, `warn`, `error`).
    logLevel: info
    # -- Default Vault auth/kubernetes role used by the binaries to log in. Per-component overrides below take precedence when set.
    kubeRole: "all-rw"
    # -- Override `kubeRole` for the NRI plugin only. Empty = falls back to `kubeRole`. Useful in projected-SA mode for privilege separation between webhook and DaemonSet identities.
    kubeRoleNri: ""
    # -- Override `kubeRole` for the renewer Deployment only. Empty = falls back to `kubeRole`. In projected-SA mode this should point at the dedicated renewer Vault role + policy.
    kubeRoleRenewer: ""
    # -- Override `kubeRole` for the revoker Deployment only. Empty = falls back to `kubeRole`. In projected-SA mode this should point at the dedicated revoker Vault role + policy.
    kubeRoleRevoker: ""
    # -- Periodic Vault token TTL requested at login. Applies to the binaries' own login tokens, not to per-pod credentials. Default ≈ 1 year.
    tokenTTL: 8766h
    # -- Name of the KV-v2 mount used for per-pod bookkeeping (lease ID, token ID, namespace, UUID). Must match the path enabled in Vault and referenced in the policies.
    vaultSecretName: vault-db-injector
    # -- First path segment under `vaultSecretName` used to scope bookkeeping per cluster. Production-grade policies should pin this segment to prevent cross-cluster reads/writes.
    vaultSecretPrefix: "kubernetes"
    # -- Enable Sentry error reporting in the binaries.
    sentry: true
    # -- Sentry DSN. Required when `sentry: true`.
    sentryDsn: https://your-sentry@sentry/660
    # -- FQDN used in the webhook service name and the TLS cert SANs.
    webhookFqdn: vault-db-injector.numberly.io
    # -- Value of the `objectSelector` label on the MutatingWebhookConfiguration. Pods carrying this label are sent to the webhook for admission.
    webhookMatchLabels: vault-db-injector
    # -- Pod label value the injector uses to recognise pods it owns.
    injectorLabel: vault-db-injector
    # -- When `true`, the injector authenticates to Vault per-pod using a Kubernetes TokenRequest JWT for the admitted pod's ServiceAccount, instead of using the injector's own SA. Requires every Vault auth/kubernetes role to have `token_period > 0`. The chart provisions the ClusterRole granting `create` on `serviceaccounts/token`.
    useProjectedSA: false
    # -- Audiences set on the TokenRequest JWT in projected-SA mode. Empty = cluster-default audience (legacy compat). Recommended for new deployments: `["vault"]` with a matching `audience` configured on each Vault k8s-auth role. The binary refuses to start when `useProjectedSA: true` and this list is empty.
    tokenRequestAudiences: []
    # -- Requested lifetime of the TokenRequest JWT in seconds. The kube-apiserver enforces a hard floor of 600s (`--service-account-min-token-expiration` default). The JWT is used for one Vault login round-trip only, so 600 is the practical minimum.
    tokenRequestExpirationSeconds: 600
  injector:
    # -- Override the ServiceAccount used by the injector Deployment. Empty = chart-managed default (`<release>`). Set to bring your own SA provisioned outside the chart (e.g. shared SA across releases).
    serviceAccountName: ""
    # -- Arguments passed to the injector container.
    args:
    - "--config=/injector/config.yaml"
    # -- Pod-level securityContext applied to the injector container. Defaults are non-root + read-only root filesystem.
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
    image:
      # -- Injector container image repository.
      repository: numberly/vault-db-injector
      # -- Injector container image tag.
      tag: 3.0.1  # x-release-please-version
    # -- imagePullPolicy applied to the injector container.
    imagePullPolicy: Always
    # -- Service ports for the webhook (HTTPS).
    ports:
    - port: 8443
      targetPort: 8443
    # -- Number of injector Deployment replicas.
    replicas: 2
    serviceAccount:
      # -- Annotations added to the injector ServiceAccount only (e.g. for IRSA / GCP Workload Identity). Not propagated to the renewer/revoker SAs.
      annotations: {}
    # -- Service type for the webhook service.
    type: ClusterIP
  renewer:
    # -- Override the ServiceAccount used by the renewer Deployment. Empty = chart-managed default (`<release>` in legacy mode, `<release>-renewer` when `useProjectedSA: true`).
    serviceAccountName: ""
    # -- Arguments passed to the renewer container.
    args:
    - "--config=/renewer/config.yaml"
    # -- Pod-level securityContext applied to the renewer container.
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
    # -- Number of renewer replicas. Leader election selects one active renewer at a time.
    replicas: 4
    image:
      # -- Renewer container image repository.
      repository: numberly/vault-db-injector
      # -- Renewer container image tag.
      tag: 3.0.1  # x-release-please-version
    # -- imagePullPolicy applied to the renewer container.
    imagePullPolicy: Always
  revoker:
    # -- Override the ServiceAccount used by the revoker Deployment. Empty = chart-managed default (`<release>` in legacy mode, `<release>-revoker` when `useProjectedSA: true`).
    serviceAccountName: ""
    # -- Arguments passed to the revoker container.
    args:
    - "--config=/revoker/config.yaml"
    # -- Pod-level securityContext applied to the revoker container.
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
    # -- Number of revoker replicas. Leader election selects one active revoker at a time.
    replicas: 4
    image:
      # -- Revoker container image repository.
      repository: numberly/vault-db-injector
      # -- Revoker container image tag.
      tag: 3.0.1  # x-release-please-version
    # -- imagePullPolicy applied to the revoker container.
    imagePullPolicy: Always

nri:
  # -- Override the ServiceAccount used by the NRI DaemonSet. Empty = chart-managed default (`<release>`, shared with the injector). Set to a distinct value to enable privilege separation between webhook and NRI identities (also requires `kubeRoleNri`).
  serviceAccountName: ""
  # -- When `true`, deploys the NRI DaemonSet AND tells the injector to wrap every credential it issues with placeholders. Both pieces are tied to this single switch so the cluster cannot end up in a "webhook produces placeholders but nothing substitutes" state. When `false`, behavior is byte-identical to the legacy webhook mode (literal credentials in env vars). Requires containerd ≥ 1.7 with NRI enabled, OR CRI-O ≥ 1.26.
  enabled: false
  image:
    # -- NRI container image repository. Empty = falls back to `vaultDbInjector.injector.image.repository`.
    repository: ""
    # -- NRI container image tag. Empty = falls back to `vaultDbInjector.injector.image.tag`.
    tag: ""
  # -- imagePullPolicy applied to the NRI container.
  imagePullPolicy: Always
  # -- Resource requests and limits for each NRI plugin pod.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # -- NRI plugin priority for `stub.WithPluginIdx`. Must be unique per containerd instance — running multiple injector releases on the same cluster requires distinct values (e.g. `"10"` for prod, `"11"` for dev). The plugin name auto-defaults to the helm release fullname.
  pluginIndex: "10"
  # -- Vault credential fetch timeout per CreateContainer event. MUST be strictly less than containerd `plugin_request_timeout` so the plugin returns an error BEFORE containerd times out the plugin (containerd-side timeout fails-open and leaks placeholders into env). Default `"1500ms"` is aligned with containerd's default `plugin_request_timeout` of `2s` (leaves 500ms for containerd to propagate the error). On nodes configured with a higher `plugin_request_timeout` (e.g. `30s` to absorb Vault bursts), raise this to ~`plugin_request_timeout - 5s`.
  fetchTimeout: "1500ms"
  # -- Tolerations for the NRI DaemonSet. The default tolerates every taint so the plugin runs on every node. The plugin is node-local — if it is missing on a tainted node where labelled pods are scheduled, those pods start with the raw placeholder string in env (visible CrashLoop, but still a leak window). Override to restrict where the plugin runs.
  tolerations:
  - operator: Exists
  # -- Node selector for the NRI DaemonSet.
  nodeSelector: {}
