vaultDbInjector:
  configuration:
    vaultAddress: "https://vault1.numberly.in:8200"
    vaultAuthPath: "kubernetes"
    logLevel: info
    kubeRole: "all-rw"
    tokenTTL: 8766h
    vaultSecretName: vault-injector
    vaultSecretPrefix: "kubernetes"
    sentry: true
    sentryDsn: https://your-sentry@sentry/660
    webhookFqdn: vault-db-injector.numberly.io
    webhookMatchLabels: vault-db-injector
  injector:
    args:
    - "--config=/injector/config.yaml"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
    image:
      repository: numberly/vault-db-injector
      tag: 2.0.12
    imagePullPolicy: Always
    ports:
    - port: 8443
      targetPort: 8443
    replicas: 2
    serviceAccount:
      annotations: {}
    type: ClusterIP
  renewer:
    args:
    - "--config=/renewer/config.yaml"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
    replicas: 4
    image:
      repository: numberly/vault-db-injector
      tag: 2.0.12
    imagePullPolicy: Always
  revoker:
    args:
    - "--config=/revoker/config.yaml"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
    replicas: 4
    image:
      repository: numberly/vault-db-injector
      tag: 2.0.12
    imagePullPolicy: Always

nri:
  # When true, deploys the NRI DaemonSet AND tells the injector to wrap
  # every credential it issues. Both pieces are tied to this single switch
  # so the cluster cannot end up in a "webhook produces placeholders but
  # nothing substitutes" state. When false, behavior is byte-identical to
  # legacy modes (literal credentials in env vars).
  #
  # Requires containerd >= 1.7 with NRI enabled in containerd config.toml,
  # OR CRI-O >= 1.26.
  enabled: false
  image:
    repository: ""  # defaults to vaultDbInjector.injector.image.repository
    tag: ""         # defaults to vaultDbInjector.injector.image.tag
  imagePullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Tolerate every taint so the DS runs on every node regardless of
  # control-plane / GPU / dedicated node taints. The plugin is
  # node-local — if it's missing on a tainted node where pods with
  # nri-mapping annotations are scheduled, those pods start with the
  # placeholder string in env (visible CrashLoop, but still a leak
  # window). Override if you want to restrict where the plugin runs.
  tolerations:
  - operator: Exists
  nodeSelector: {}