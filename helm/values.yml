vaultDbInjector:
  configuration:
    vaultAddress: "https://vault1.numberly.in:8200"
    vaultAuthPath: "kubernetes"
    logLevel: info
    kubeRole: "all-rw"
    # Optional per-mode overrides for kubeRole. When empty, the mode
    # falls back to `kubeRole` above. Useful in projected-SA mode where
    # the renewer and revoker have dedicated Vault roles + policies.
    # See docs/how-it-works/vault-roles-and-policies.md.
    kubeRoleNri: ""
    kubeRoleRenewer: ""
    kubeRoleRevoker: ""
    tokenTTL: 8766h
    vaultSecretName: vault-injector
    vaultSecretPrefix: "kubernetes"
    sentry: true
    sentryDsn: https://your-sentry@sentry/660
    webhookFqdn: vault-db-injector.numberly.io
    webhookMatchLabels: vault-db-injector
    injectorLabel: vault-db-injector
    # When true, the injector authenticates to Vault per-pod by issuing
    # a Kubernetes TokenRequest for the admitted pod's ServiceAccount,
    # rather than using the injector's own SA. Requires:
    #   - Each Vault auth/kubernetes role to have token_period > 0
    #   - The chart will provision a ClusterRole granting create on
    #     serviceaccounts/token
    # See docs/how-it-works/projected-sa.md for the Vault config.
    useProjectedSA: false
    # Audiences set on the TokenRequest. Empty list = use the
    # cluster-default audience (legacy compat). Recommended for new
    # deployments: ["vault"], with a matching `audience` configured on
    # each Vault k8s-auth role.
    tokenRequestAudiences: []
    # Requested lifetime of the TokenRequest JWT, in seconds. The
    # kube-apiserver enforces a hard floor of 600s (--service-account-
    # min-token-expiration default) and rejects lower values with
    # `Invalid value: spec.expirationSeconds`. The JWT is only used for
    # one Vault login round-trip, so 600 is the practical minimum.
    tokenRequestExpirationSeconds: 600
  injector:
    # Override the ServiceAccount used by the injector Deployment.
    # Empty = chart-managed default (<release>). Set to BYO an SA
    # provisioned outside the chart (e.g., shared SA across releases).
    serviceAccountName: ""
    args:
    - "--config=/injector/config.yaml"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
    image:
      repository: numberly/vault-db-injector
      tag: 2.0.12
    imagePullPolicy: Always
    ports:
    - port: 8443
      targetPort: 8443
    replicas: 2
    serviceAccount:
      annotations: {}
    type: ClusterIP
  renewer:
    # Override the ServiceAccount used by the renewer Deployment.
    # Empty = chart-managed default (<release> in legacy mode,
    # <release>-renewer when useProjectedSA: true).
    serviceAccountName: ""
    args:
    - "--config=/renewer/config.yaml"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
    replicas: 4
    image:
      repository: numberly/vault-db-injector
      tag: 2.0.12
    imagePullPolicy: Always
  revoker:
    # Override the ServiceAccount used by the revoker Deployment.
    # Empty = chart-managed default (<release> in legacy mode,
    # <release>-revoker when useProjectedSA: true).
    serviceAccountName: ""
    args:
    - "--config=/revoker/config.yaml"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsGroup: 65534
      runAsNonRoot: true
      runAsUser: 65534
    replicas: 4
    image:
      repository: numberly/vault-db-injector
      tag: 2.0.12
    imagePullPolicy: Always

nri:
  # Override the ServiceAccount used by the NRI DaemonSet.
  # Empty = chart-managed default (<release>).
  serviceAccountName: ""
  # When true, deploys the NRI DaemonSet AND tells the injector to wrap
  # every credential it issues. Both pieces are tied to this single switch
  # so the cluster cannot end up in a "webhook produces placeholders but
  # nothing substitutes" state. When false, behavior is byte-identical to
  # legacy modes (literal credentials in env vars).
  #
  # Requires containerd >= 1.7 with NRI enabled in containerd config.toml,
  # OR CRI-O >= 1.26.
  enabled: false
  image:
    repository: ""  # defaults to vaultDbInjector.injector.image.repository
    tag: ""         # defaults to vaultDbInjector.injector.image.tag
  imagePullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # NRI plugin priority for stub.WithPluginIdx. Must be unique per
  # containerd instance — running multiple injector releases on the
  # same cluster requires distinct values (e.g. "10" for prod, "11"
  # for dev). Plugin name auto-defaults to the helm release fullname.
  pluginIndex: "10"
  # Tolerate every taint so the DS runs on every node regardless of
  # control-plane / GPU / dedicated node taints. The plugin is
  # node-local — if it's missing on a tainted node where labelled
  # pods are scheduled, those pods start with the placeholder string
  # in env (visible CrashLoop, but still a leak window). Override
  # if you want to restrict where the plugin runs.
  tolerations:
  - operator: Exists
  nodeSelector: {}

# When useProjectedSA is enabled, the chart provisions dedicated SAs
# for the renewer and revoker. The Vault operator must create matching
# auth/kubernetes role entries:
#   - auth/kubernetes/role/<release>-renewer:
#       bound_service_account_names = <release>-renewer
#       bound_service_account_namespaces = <Release.Namespace>
#       token_policies = <release>-renewer
#       (policy: update on auth/token/renew + sys/leases/renew)
#   - auth/kubernetes/role/<release>-revoker:
#       bound_service_account_names = <release>-revoker
#       bound_service_account_namespaces = <Release.Namespace>
#       token_policies = <release>-revoker
#       (policy: update on auth/token/revoke-orphan + sys/leases/revoke)
# See docs/how-it-works/projected-sa.md for the full Vault config.