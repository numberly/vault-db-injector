site_name: Vault DB Injector Documentation
site_url: https://numberly.github.io/vault-db-injector
repo_url: https://github.com/numberly/vault-db-injector

docs_dir: docs/

copyright: Copyright © 2024 Numberly

theme:
  name: material
  font: false
  icon:
    logo: material/lock
  palette:
    primary: blue
  features:
    - navigation.expand
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - toc.follow
    - toc.integrate

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/numberly/vault-db-injector
      name: vault-db-injector on Github

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/overview.md
    - getting-started/prerequisites.md
    - getting-started/setup-kubernetes.md
    - getting-started/setup-vault.md
    - getting-started/setup-database.md
    - getting-started/vault-policies.md
    - getting-started/install-injector.md
    - getting-started/first-injected-pod.md
  - For Application Developers:
    - developers/annotations.md
    - developers/injection-modes.md
    - developers/examples.md
    - developers/troubleshooting.md
  - For Platform Operators:
    - operators/architecture.md
    - operators/components.md
    - operators/security.md
    - operators/monitoring.md
    - operators/operations.md
    - operators/legacy-webhook-mode.md
    - operators/migration-v2-to-v3.md
  - For Contributors:
    - contributors/build-from-source.md
    - contributors/contributing.md
    - contributors/comparison.md
    - contributors/architecture-deep-dive.md
  - Reference:
    - reference/glossary.md
    - reference/configuration.md
    - reference/helm-values.md
    - reference/metrics.md
plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fr
          name: Français
          build: true
          theme:
            palette:
              primary: red
          nav_translations:
            Home: Accueil
            Getting Started: Démarrage rapide
            For Application Developers: Pour les développeurs
            For Platform Operators: Pour les opérateurs
            For Contributors: Pour les contributeurs
            Reference: Référence