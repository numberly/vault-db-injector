name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to (re)publish (e.g. v3.2.1)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  ci-gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  build-image:
    name: Build and push image (unsigned)
    needs: ci-gate
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.version.outputs.version }}
      is-prerelease: ${{ steps.version.outputs.is-prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${VERSION}" == *-* ]]; then
            echo "is-prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        name: Build and push (unsigned tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/numberly/vault-db-injector:${{ steps.version.outputs.version }}-unsigned
          provenance: true
          sbom: true

  cosign-sign:
    name: Cosign keyless sign
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: sigstore/cosign-installer@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign image by digest
        env:
          DIGEST: ${{ needs.build-image.outputs.digest }}
        run: cosign sign --yes "ghcr.io/numberly/vault-db-injector@${DIGEST}"

  trivy-scan:
    name: Trivy image scan
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/numberly/vault-db-injector:${{ needs.build-image.outputs.version }}-unsigned
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: ".trivyignore"

  retag-stable:
    name: Promote to stable tag
    needs: [cosign-sign, trivy-scan, build-image]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create stable tag from unsigned-tag manifest
        env:
          VERSION: ${{ needs.build-image.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "ghcr.io/numberly/vault-db-injector:${VERSION}" \
            "ghcr.io/numberly/vault-db-injector:${VERSION}-unsigned"
      - name: Tag :latest if not prerelease
        if: needs.build-image.outputs.is-prerelease == 'false'
        env:
          VERSION: ${{ needs.build-image.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "ghcr.io/numberly/vault-db-injector:latest" \
            "ghcr.io/numberly/vault-db-injector:${VERSION}-unsigned"
      # NOTE: we intentionally do NOT delete the :VERSION-unsigned tag.
      # On GHCR, `docker buildx imagetools create -t VERSION VERSION-unsigned`
      # does not produce a new package version — it just attaches the
      # `VERSION` (and `latest`) tag to the existing version that already
      # carries `VERSION-unsigned`. The GHCR REST API has no per-tag
      # deletion; `DELETE /packages/.../versions/{id}` removes the whole
      # package version, which wipes the stable tags we just promoted.
      # Leaving the `-unsigned` tag in place on the same version is the
      # least-bad option and is consistent: it is literally the same
      # image bytes that VERSION and latest point to.

  chart-releaser:
    name: Publish chart to gh-pages
    needs: retag-stable
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - name: Configure git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4
      - name: Pre-package the chart
        run: |
          mkdir -p .cr-release-packages
          helm package helm -d .cr-release-packages
          ls -la .cr-release-packages
      # Pinned to the post-v1.7.0 main commit that ships #202
      # ("Write chart_version only if latest_tag is defined"). The v1.7.0
      # tag dereferences `latest_tag` unconditionally under `set -u`, which
      # crashes any run that uses skip_packaging: true (our case — we
      # pre-package above) with `cr.sh: line 111: latest_tag: unbound
      # variable`, even after the chart and gh-pages index have been
      # pushed successfully. Repin to a tagged release once one is cut
      # past v1.7.0.
      - uses: helm/chart-releaser-action@3e001cb8c68933439c7e721650f20a07a1a5c61e
        with:
          charts_dir: helm
          skip_packaging: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_SKIP_EXISTING: "true"

  chart-oci-push:
    name: Publish chart to ghcr.io OCI
    needs: retag-stable
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4
      - uses: sigstore/cosign-installer@v3
      # cosign reads ~/.docker/config.json, which `helm registry login`
      # does not populate. Without docker/login-action the `cosign sign`
      # step further down fails with `UNAUTHORIZED: User cannot be
      # authenticated with the token provided`.
      - name: Log in to GHCR (docker auth for cosign)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to GHCR (helm auth for push)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Package and push chart
        id: push
        run: |
          helm package helm
          PKG=$(find . -maxdepth 1 -name 'vault-db-injector-*.tgz' | head -1)
          helm push "${PKG}" oci://ghcr.io/numberly/charts 2> /tmp/helm-push.err
          cat /tmp/helm-push.err
          DIGEST=$(awk '/^Digest: sha256:/ {print $2}' /tmp/helm-push.err)
          if [ -z "${DIGEST}" ]; then
            echo "::error::Failed to extract chart manifest digest from helm push output"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Sign chart by digest
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "ghcr.io/numberly/charts/vault-db-injector@${DIGEST}"

  augment-release-notes:
    name: Add verification commands to release notes
    needs: [retag-stable, chart-releaser, chart-oci-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Append verification commands
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$(gh release view "${TAG}" --repo "${REPO}" --json body --jq '.body')
          APPENDIX="

          ## Pull

          \`\`\`
          docker pull ghcr.io/numberly/vault-db-injector:${TAG}
          helm pull oci://ghcr.io/numberly/charts/vault-db-injector --version ${TAG#v}
          helm repo add numberly https://numberly.github.io/vault-db-injector
          helm pull numberly/vault-db-injector --version ${TAG#v}
          \`\`\`

          ## Verify the Cosign signature

          \`\`\`
          cosign verify ghcr.io/numberly/vault-db-injector:${TAG} \\
            --certificate-identity-regexp=\"^https://github.com/numberly/vault-db-injector/.github/workflows/release.yml@refs/tags/v[0-9].*\\\$\" \\
            --certificate-oidc-issuer=\"https://token.actions.githubusercontent.com\"
          \`\`\`
          "
          gh release edit "${TAG}" --repo "${REPO}" --notes "${BODY}${APPENDIX}"
