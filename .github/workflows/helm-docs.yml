name: helm-docs

on:
  push:
    branches: [ "main" ]
    paths:
      - 'helm/values.yml'
      - 'helm/values.yaml'
      - 'helm/Chart.yml'
      - 'helm/Chart.yaml'
      - 'helm/README.md.gotmpl'
      - 'helm/README.md'
      - '.github/workflows/helm-docs.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'helm/values.yml'
      - 'helm/values.yaml'
      - 'helm/Chart.yml'
      - 'helm/Chart.yaml'
      - 'helm/README.md.gotmpl'
      - 'helm/README.md'
      - '.github/workflows/helm-docs.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install helm-docs
        run: |
          HELM_DOCS_VERSION=1.14.2
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.deb" -o /tmp/helm-docs.deb
          sudo dpkg -i /tmp/helm-docs.deb
          helm-docs --version

      - name: Verify helm/README.md is in sync with helm/values.yml
        run: make helm-docs-check
